name: Restore DB from live to staging

on:
  workflow_call:
    inputs:
      live_directory:
        required: true
        type: string
      staging_directory:
        required: true
        type: string
      blog_images_path:
        required: true
        type: string
    secrets:
      SERVER_HOST:
        required: true
      SERVER_USERNAME:
        required: true
      SERVER_PASSWORD:
        required: true
      DIR:
        required: true

jobs:
  dump_staging_blog:
    runs-on: ubuntu-latest
    steps:
      - name: Parse and Dump Staging DB
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ${{ inputs.staging_directory }}
            
            # Extract variables safely without eval (silencing PHP warnings)
            DB_NAME=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_NAME;")
            DB_USER=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_USER;")
            DB_PASS=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_PASSWORD;")
            
            # Failsafe: Check if extraction worked
            if [ -z "$DB_NAME" ] || [ -z "$DB_USER" ]; then
              echo "Error: Could not extract staging credentials from wp-config.php in $(pwd)"
              exit 1
            fi
            
            echo "Dumping Staging DB: $DB_NAME"
            mysqldump -u"$DB_USER" -p"$DB_PASS" "$DB_NAME" > stagingBlogDBDump.sql
            
            cat stagingBlogDBDump.sql | sed -e 's/DEFINER[ ]*=[ ]*[^*]*\*/\*/' > stagingBlogDBDumpWithoutDefiner_"`date +"%d-%m-%Y"`".sql
            rm stagingBlogDBDump.sql
            find -name "staging*.sql" -type f -mtime +14 -delete

  dump_live_blog:
    runs-on: ubuntu-latest
    steps:
      - name: Parse and Dump Live DB
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ${{ inputs.live_directory }}
            
            # Extract live variables safely
            DB_NAME=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_NAME;")
            DB_USER=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_USER;")
            DB_PASS=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_PASSWORD;")
            
            # Failsafe: Check if extraction worked
            if [ -z "$DB_NAME" ] || [ -z "$DB_USER" ]; then
              echo "Error: Could not extract live credentials from wp-config.php in $(pwd)"
              exit 1
            fi
            
            echo "Dumping Live DB: $DB_NAME"
            mysqldump -u"$DB_USER" -p"$DB_PASS" "$DB_NAME" > ${{ inputs.staging_directory }}/currentLiveBlogDBDump.sql
            
            cd ${{ inputs.staging_directory }}
            cat currentLiveBlogDBDump.sql | sed -e 's/DEFINER[ ]*=[ ]*[^*]*\*/\*/' > currentLiveBlogDBDumpWithoutDefiner.sql
            rm currentLiveBlogDBDump.sql

  restore_live_db_backup_to_staging:
    runs-on: ubuntu-latest
    needs: [dump_staging_blog, dump_live_blog]
    steps:
      - name: Restore Live DB Backup To Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ${{ inputs.staging_directory }}
            
            # Parse staging credentials again to import the new data
            DB_NAME=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_NAME;")
            DB_USER=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_USER;")
            DB_PASS=$(php -r "error_reporting(0); require 'wp-config.php'; echo DB_PASSWORD;")
            
            if [ -z "$DB_NAME" ] || [ -z "$DB_USER" ]; then
              echo "Error: Could not extract staging credentials for restore."
              exit 1
            fi
            
            echo "Restoring into Staging DB: $DB_NAME"
            mysql -u"$DB_USER" -p"$DB_PASS" "$DB_NAME" < currentLiveBlogDBDumpWithoutDefiner.sql
            rm currentLiveBlogDBDumpWithoutDefiner.sql

  copy_media_and_update:
    runs-on: ubuntu-latest
    needs: restore_live_db_backup_to_staging
    steps:
      - name: Sync Media and Update DB
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Syncing media from live..."
            # Copy Uploads
            cp -r ${{ inputs.live_directory }}/wp-content/uploads/* ${{ inputs.staging_directory }}/wp-content/uploads/ 
            # Copy Custom Images Path
            cp -r ${{ inputs.live_directory }}/${{ inputs.blog_images_path }}* ${{ inputs.staging_directory }}/${{ inputs.blog_images_path }}

            echo "Running updater script..."
            cd ${{ inputs.staging_directory }}
            cd ..
            if [ -f db-blog-updater.php ]; then
              php db-blog-updater.php
            else
              echo "Error: db-blog-updater.php not found in $(pwd)"
              exit 1
            fi
