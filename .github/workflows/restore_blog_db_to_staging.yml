name: Restore DB from live to staging

on:
  workflow_call:
    inputs:
      live_directory:
        required: true
        type: string
      staging_directory:
        required: true
        type: string
      blog_images_path:
        required: true
        type: string
    secrets:
      SERVER_HOST:
        required: true
      SERVER_USERNAME:
        required: true
      SERVER_PASSWORD:
        required: true
      DIR:
        required: true

jobs:
  dump_staging_and_live:
    name: Backup Staging and Dump Live
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Prepare Dumps
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # --- 1. BACKUP STAGING DB ---
            cd ${{ inputs.staging_directory }} || exit 1
            
            # Find wp-config.php
            if [ -f "wp-config.php" ]; then WPC="wp-config.php"; elif [ -f "../wp-config.php" ]; then WPC="../wp-config.php"; else echo "wp-config not found"; exit 1; fi
            
            # Extract Credentials using grep/awk (much more reliable than php require)
            S_NAME=$(grep "DB_NAME" $WPC | awk -F "['\"]" '{print $4}')
            S_USER=$(grep "DB_USER" $WPC | awk -F "['\"]" '{print $4}')
            S_PASS=$(grep "DB_PASSWORD" $WPC | awk -F "['\"]" '{print $4}')
            
            if [ -z "$S_NAME" ] || [ -z "$S_USER" ]; then echo "Staging credentials extraction failed"; exit 1; fi

            echo "Backing up Staging DB: $S_NAME"
            mysqldump -u"$S_USER" -p"$S_PASS" "$S_NAME" | sed -e 's/DEFINER[ ]*=[ ]*[^*]*\*/\*/' > staging_backup_$(date +%F).sql
            find -name "staging_backup_*.sql" -type f -mtime +14 -delete

            # --- 2. DUMP LIVE DB ---
            cd ${{ inputs.live_directory }} || exit 1
            if [ -f "wp-config.php" ]; then WPC="wp-config.php"; elif [ -f "../wp-config.php" ]; then WPC="../wp-config.php"; else echo "wp-config not found"; exit 1; fi
            
            L_NAME=$(grep "DB_NAME" $WPC | awk -F "['\"]" '{print $4}')
            L_USER=$(grep "DB_USER" $WPC | awk -F "['\"]" '{print $4}')
            L_PASS=$(grep "DB_PASSWORD" $WPC | awk -F "['\"]" '{print $4}')
            
            if [ -z "$L_NAME" ] || [ -z "$L_USER" ]; then echo "Live credentials extraction failed"; exit 1; fi

            echo "Dumping Live DB: $L_NAME"
            mysqldump -u"$L_USER" -p"$L_PASS" "$L_NAME" | sed -e 's/DEFINER[ ]*=[ ]*[^*]*\*/\*/' > ${{ inputs.staging_directory }}/currentLiveBlogDBDump.sql

  restore_and_sync:
    name: Import Data and Sync Media
    runs-on: ubuntu-latest
    needs: dump_staging_and_live
    steps:
      - name: SSH and Finalise Restore
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ${{ inputs.staging_directory }} || exit 1
            
            if [ -f "wp-config.php" ]; then WPC="wp-config.php"; else WPC="../wp-config.php"; fi
            S_NAME=$(grep "DB_NAME" $WPC | awk -F "['\"]" '{print $4}')
            S_USER=$(grep "DB_USER" $WPC | awk -F "['\"]" '{print $4}')
            S_PASS=$(grep "DB_PASSWORD" $WPC | awk -F "['\"]" '{print $4}')
            
            echo "Importing Live Data into Staging: $S_NAME"
            mysql -u"$S_USER" -p"$S_PASS" "$S_NAME" < currentLiveBlogDBDump.sql
            rm currentLiveBlogDBDump.sql
            
            echo "Syncing Media..."
            cp -r ${{ inputs.live_directory }}/wp-content/uploads/* ${{ inputs.staging_directory }}/wp-content/uploads/ 
            cp -r ${{ inputs.live_directory }}/${{ inputs.blog_images_path }}* ${{ inputs.staging_directory }}/${{ inputs.blog_images_path }}
            
            echo "Running Updater..."
            cd ..
            if [ -f db-blog-updater.php ]; then
              php db-blog-updater.php
            else
              echo "Error: db-blog-updater.php not found in $(pwd)"
              exit 1
            fi
